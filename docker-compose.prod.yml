services:
  # ─── PostgreSQL 15 ───
  postgres:
    image: postgres:15-alpine
    container_name: devdna-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-developerdna}
      POSTGRES_USER: ${POSTGRES_USER:-devdna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devdna_local_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devdna} -d ${POSTGRES_DB:-developerdna}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - devdna-net

  # ─── Apache Kafka (KRaft mode — no Zookeeper) ───
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: devdna-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft combined broker+controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # Listeners — separate external (host), internal (containers), and controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_LISTENERS: 'CONTROLLER://0.0.0.0:29093,PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      # Single-node dev defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - devdna-net

  # ─── Django Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devdna-backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://devdna:devdna_local_pass@postgres:5432/developerdna}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devdna-net

  # ─── Kafka Consumer Worker ───
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devdna-worker
    command: python manage.py run_consumer
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://devdna:devdna_local_pass@postgres:5432/developerdna}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devdna-net

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devdna-frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - devdna-net

  # ─── Cloudflare Tunnel (1-Click Public Expose) ───
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: devdna-cloudflared
    command: tunnel --url http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - public
    networks:
      - devdna-net

volumes:
  postgres_data:
  kafka_data:

networks:
  devdna-net:
    driver: bridge
